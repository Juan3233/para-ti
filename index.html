<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Jaqueline ❤️</title>
<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
text-align:center;
color:white;
}

/* GALAXIA */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#1b2735,#090a0f);
z-index:-2;
}

/* LUNA */
.luna{
position:absolute;
top:40px;
right:40px;
width:180px;
height:180px;
background:#ddd;
border-radius:50%;
box-shadow:0 0 60px white;
}

/* PALOMAS */
.paloma{
position:absolute;
width:60px;
animation:volar 20s linear infinite;
}

@keyframes volar{
0%{left:-100px;top:200px;}
100%{left:120%;top:50px;}
}

/* CORAZONES FLOTANDO */
.corazon{
position:absolute;
color:#ff2e63;
font-size:25px;
animation:subir 8s linear infinite;
}

@keyframes subir{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* CONSTELACION */
.constelacion{
margin-top:140px;
font-size:32px;
letter-spacing:10px;
text-shadow:0 0 10px white;
}

/* CONTADOR */
#contador{
font-size:22px;
margin-top:20px;
}

/* MENSAJE */
#mensaje{
margin-top:20px;
font-size:26px;
height:40px;
}

/* FRASES */
.frases{
position:absolute;
bottom:140px;
width:100%;
height:200px;
overflow:hidden;
pointer-events:none;
}

.frases span{
position:absolute;
white-space:nowrap;
animation:slide 14s linear infinite;
}

@keyframes slide{
0%{left:100%;}
100%{left:-100%;}
}

/* FOTOS */
.foto{
position:absolute;
width:180px;
border-radius:15px;
box-shadow:0 0 15px white;
animation:flotar 18s linear infinite;
}

@keyframes flotar{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* BOTONES */
.botones{
position:fixed;
bottom:10px;
width:100%;
display:flex;
justify-content:center;
gap:10px;
}

button{
padding:10px 15px;
font-size:14px;
border:none;
border-radius:10px;
background:#ff4081;
color:white;
cursor:pointer;
}

/* PROPUESTA */
#propuesta{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:30px;
z-index:999;
}

/* CORAZONES QUE SE JUNTAN */
.corazon-juntar{
position:absolute;
font-size:40px;
color:#ff4081;
animation:unir 6s ease-in-out infinite alternate;
}

@keyframes unir{
0%{transform:translate(0,0);}
50%{transform:translate(50px,-50px);}
100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<div class="luna"></div>

<div class="constelacion">✨ J A Q U E L I N E ✨</div>

<div id="contador"></div>

<div id="mensaje"></div>

<div class="frases" id="frases"></div>

<!-- FOTOS (pon tus fotos reales aquí) -->
<img class="foto" style="left:10%;" src="foto1.jpeg">
<img class="foto" style="left:60%;" src="foto2.jpeg">

<!-- PALOMAS (puedes cambiar la imagen si quieres) -->
<img class="paloma" src="https://pixabay.com/es/vectors/conejito-liebre-conejo-gris-155674/">

<!-- BOTONES -->
<div class="botones">
<button onclick="pararMusica()">⏹ Parar música</button>
<button onclick="triste()">💌 Ábrelo cuando estés triste</button>
<button onclick="mostrarPropuesta()">💍 Propuesta</button>
</div>

<!-- PROPUESTA FINAL -->
<div id="propuesta">
💍 Jaqueline
<br><br>
¿Quieres pasar toda la vida a mi lado?
<br><br>
<button onclick="alert('Sabía que dirías que sí 💖')">Sí ❤️</button>
</div>

<!-- MUSICA -->
<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
// REPRODUCIR MUSICA AL TOCAR PANTALLA
document.body.addEventListener("click",function(){
document.getElementById("musica").play();
},{once:true});

// PARAR MUSICA
function pararMusica(){
document.getElementById("musica").pause();
}

// MENSAJE LETRA POR LETRA
let texto="Te amo muchísimo Jaqueline ❤️";
let i=0;
function escribir(){
if(i<texto.length){
document.getElementById("mensaje").innerHTML+=texto.charAt(i);
i++;
setTimeout(escribir,100);
}}
escribir();

// CONTADOR DE DIAS
let inicio=new Date("2024-02-14");
function actualizar(){
let ahora=new Date();
let diff=ahora-inicio;
let dias=Math.floor(diff/86400000);
document.getElementById("contador").innerHTML=
"❤️ Llevamos "+dias+" días juntos ❤️";
}
setInterval(actualizar,1000);
actualizar();

// FRASES DESLIZANTES SIN CHOCAR
let lista=[
"Eres mi lugar favorito ❤️",
"Contigo todo es mejor",
"Eres mi felicidad",
"Mi vida cambió contigo",
"Eres mi sueño",
"Mi amor eterno",
"Mi corazón es tuyo",
"Siempre contigo",
"Eres mi mundo",
"Te amo infinitamente"
];

let cont=document.getElementById("frases");
lista.forEach((f,i)=>{
let span=document.createElement("span");
span.innerText=f;
span.style.top=(i*20)+"px"; // altura distinta para no chocar
span.style.animationDelay=(i*3)+"s";
cont.appendChild(span);
});

// CORAZONES FLOTANDO
setInterval(()=>{
let c=document.createElement("div");
c.className="corazon";
c.innerHTML="❤";
c.style.left=Math.random()*100+"%";
document.body.appendChild(c);
setTimeout(()=>c.remove(),8000);
},500);

// CORAZONES QUE SE JUNTAN
let c2=document.createElement("div");
c2.className="corazon-juntar";
c2.style.left="20%";
c2.style.top="60%";
document.body.appendChild(c2);
let c3=document.createElement("div");
c3.className="corazon-juntar";
c3.style.left="70%";
c3.style.top="60%";
document.body.appendChild(c3);

// FUEGOS ARTIFICIALES AL TOCAR
document.addEventListener("click",e=>{
for(let i=0;i<10;i++){
let f=document.createElement("div");
f.innerHTML="✨";
f.style.position="absolute";
f.style.left=e.clientX+"px";
f.style.top=e.clientY+"px";
f.style.fontSize="20px";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
});

// MENSAJE TRISTE
function triste(){
alert("Si estás triste recuerda que siempre estaré para ti ❤️");
}

// PROPUESTA FINAL
function mostrarPropuesta(){
document.getElementById("propuesta").style.display="flex";
}
</script>

</body>
</html>
