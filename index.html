<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Te Amo Jaqueline</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
text-align:center;
}

/* Luna */
.luna{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
width:250px;
height:250px;
border-radius:50%;
background:radial-gradient(circle,#fff 40%,#ddd 60%,#bbb 100%);
box-shadow:0 0 50px #ffffff55,0 0 100px #ffffff55;
opacity:0.25;
z-index:1;
}

h1{
position:relative;
z-index:3;
margin-top:170px;
font-size:55px;
color:#ffe6ff;
text-shadow:0 0 25px #ff66cc,0 0 40px #ff99dd;
animation:brillar 2s infinite alternate;
}

@keyframes brillar{
from{opacity:0.7;}
to{opacity:1;}
}

/* Estrellas */
.estrella{
position:absolute;
color:white;
font-size:12px;
opacity:0.8;
animation:parpadeo 2s infinite alternate;
}

@keyframes parpadeo{
0%{opacity:0.2;}
100%{opacity:1;}
}

/* Emojis cayendo */
.emoji{
position:absolute;
font-size:40px;
animation:caer 8s linear infinite;
opacity:0.9;
}

@keyframes caer{
0%{transform:translateY(-120px) rotate(0deg);}
100%{transform:translateY(100vh) rotate(360deg);}
}

/* Fotos */
.foto{
position:absolute;
width:170px;
border-radius:10px;
box-shadow:0 0 20px #ffffffcc;
animation:flotar 12s ease-in-out infinite;
z-index:5;
}

@keyframes flotar{
0%{transform:translateY(0) translateX(0);}
50%{transform:translateY(-40px) translateX(20px);}
100%{transform:translateY(0) translateX(0);}
}

/* Rosas */
.rosa{
position:absolute;
font-size:40px;
animation:caer 9s linear infinite;
}

/* Fuegos */
.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
animation:explotar 1.2s ease-out forwards;
}

@keyframes explotar{
0%{transform:scale(0.2);opacity:1;}
100%{transform:scale(12);opacity:0;}
}

/* Estrella fugaz */
.fugaz{
position:absolute;
top:20%;
left:-200px;
width:150px;
height:4px;
background:linear-gradient(90deg,white,transparent);
animation:fugaz 3s ease-out infinite;
transform:rotate(-20deg);
}

@keyframes fugaz{
0%{left:-200px;opacity:0;}
10%{opacity:1;}
100%{left:120%;opacity:0;}
}
</style>
</head>

<body>

<div class="luna"></div>

<h1>✨🌙 Te Amo Jaqueline 🌙✨</h1>

<!-- MUSICA -->
<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<button onclick="reproducirMusica()" style="padding:12px 20px;font-size:18px;border-radius:10px;">
💖 Reproducir nuestra canción
</button>

<!-- Fotos -->
<img src="foto1.jpeg" class="foto" style="top:65%;left:10%;">
<img src="foto2.jpeg" class="foto" style="top:30%;left:75%;">

<div class="fugaz"></div>

<script>

/* reproducir musica */
function reproducirMusica(){
const musica=document.getElementById("musica");
musica.play();
}

/* estrellas */
for(let i=0;i<120;i++){
const star=document.createElement("div");
star.className="estrella";
star.innerText="✦";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
star.style.fontSize=(5+Math.random()*10)+"px";
document.body.appendChild(star);
}

/* rosas */
function crearRosa(){
const r=document.createElement("div");
r.className="rosa";
r.innerText="🌹";
r.style.left=Math.random()*100+"vw";
r.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(r);
setTimeout(()=>r.remove(),10000);
}
setInterval(crearRosa,700);

/* fuegos artificiales */
function crearFuego(){
const f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*60+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1500);
}
setInterval(crearFuego,1200);

/* emojis */
const emojis=["🌙","⭐","✨","💫","🌟"];
function crearEmoji(){
const e=document.createElement("div");
e.className="emoji";
e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(e);
setTimeout(()=>e.remove(),11000);
}
setInterval(crearEmoji,400);

</script>

</body>
</html>
